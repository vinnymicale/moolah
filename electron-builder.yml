appId: com.householdfinance.app
productName: Household Finance
copyright: © Household Finance

directories:
  output: dist-desktop
  # Not "build" — that path is gitignored by the Next.js template.
  buildResources: build-desktop

# Files packed into the app bundle (asar). The Next.js server and Prisma CLI are
# delivered as extraResources below instead, because they're spawned as separate
# processes and must live as real files on disk.
files:
  - electron/**/*
  - package.json
  - node_modules/**/*

# Native Postgres binaries can't execute from inside the asar archive.
asarUnpack:
  - node_modules/embedded-postgres/**
  - node_modules/@embedded-postgres/**

extraResources:
  # Next.js standalone server + its assets → resources/app
  - from: .next/standalone
    to: app
  - from: .next/static
    to: app/.next/static
  - from: public
    to: app/public
  - from: src/generated/prisma
    to: app/src/generated/prisma
  # Prisma CLI + schema + plain-JS config → resources/prisma-cli (for `db push`)
  - from: prisma/schema.prisma
    to: prisma-cli/prisma/schema.prisma
  - from: electron/prisma.config.packaged.js
    to: prisma-cli/prisma.config.js
  - from: node_modules/prisma
    to: prisma-cli/node_modules/prisma
  - from: node_modules/@prisma
    to: prisma-cli/node_modules/@prisma

win:
  target: nsis
  # Place a 256x256 icon here to brand the app:
  # icon: build-desktop/icon.ico

nsis:
  oneClick: false
  perMachine: false
  allowToChangeInstallationDirectory: true
  createDesktopShortcut: true
  createStartMenuShortcut: true

# Auto-update feed. Publishing a GitHub Release with the built artifacts lets the
# installed app update itself (see docs/desktop.md). Remove this block to disable.
publish:
  provider: github
  owner: vinnymicale
  repo: household-finance
