version: 2
updates:
  - package-ecosystem: npm
    directory: /
    schedule:
      interval: weekly
    groups:
      # One PR for routine bumps instead of a flood; majors stay separate.
      minor-and-patch:
        update-types: ["minor", "patch"]
    ignore:
      # eslint-config-next requires eslint 9; revisit when Next supports 10.
      - dependency-name: eslint
        update-types: ["version-update:semver-major"]
      # Types should track the pinned Node 20 runtime, not the latest Node.
      - dependency-name: "@types/node"
        update-types: ["version-update:semver-major"]
  - package-ecosystem: github-actions
    directory: /
    schedule:
      interval: weekly
