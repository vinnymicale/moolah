name: CodeQL

on:
  push:
    branches: [master]
  pull_request:
    branches: [master]
  schedule:
    - cron: "30 9 * * 1" # weekly, Monday morning

jobs:
  analyze:
    name: Analyze
    runs-on: ubuntu-latest
    timeout-minutes: 20
    permissions:
      security-events: write
      contents: read
    steps:
      - uses: actions/checkout@v6

      - uses: github/codeql-action/init@v4
        with:
          languages: javascript-typescript
          # Generated Prisma client is vendored output, not our code.
          config: |
            paths-ignore:
              - src/generated

      - uses: github/codeql-action/analyze@v4
