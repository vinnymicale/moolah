name: Dependabot auto-merge

# Flags Dependabot PRs for auto-merge; GitHub then merges them once the
# required CI checks pass (enforced by branch protection on master).
# npm minor/patch and all github-actions bumps auto-merge; npm majors are
# left for manual review since they can carry breaking API changes.

on: pull_request

permissions:
  contents: write
  pull-requests: write

jobs:
  auto-merge:
    runs-on: ubuntu-latest
    if: github.event.pull_request.user.login == 'dependabot[bot]'
    steps:
      - name: Fetch update metadata
        id: meta
        uses: dependabot/fetch-metadata@v3
        with:
          github-token: ${{ secrets.GITHUB_TOKEN }}

      - name: Enable auto-merge
        # Everything except npm major bumps: npm minor/patch and all
        # github-actions updates (majors there are just action tag bumps,
        # gated by CI anyway).
        if: >-
          steps.meta.outputs.package-ecosystem == 'github_actions' ||
          steps.meta.outputs.update-type != 'version-update:semver-major'
        run: gh pr merge --auto --squash "$PR_URL"
        env:
          PR_URL: ${{ github.event.pull_request.html_url }}
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
